<section class="lobby">
  <div class="lobby__inner">
    <h1 class="lobby__title">Modos de juego</h1>

    <button type="button" class="lobby__cta" appNavPending (click)="goToCampaign()">
      <span class="lobby__cta-title">Modo campaña</span>
      <span class="lobby__cta-subtitle">Escalá el ranking de 100 bots hasta el puesto #1</span>
    </button>

    <button type="button" class="lobby__cta" appNavPending (click)="goToBots()">
      <span class="lobby__cta-title">Jugar contra bots</span>
      <span class="lobby__cta-subtitle">Elegí tu oponente y configurá la serie</span>
    </button>

    <button type="button" class="lobby__cta" appNavPending (click)="goToBotsDuel()">
      <span class="lobby__cta-title">Mirar dos bots</span>
      <span class="lobby__cta-subtitle">Armá un duelo entre bots y mirá la partida en vivo</span>
    </button>

    <button type="button" class="lobby__cta" appNavPending (click)="goToQuickMatch()">
      <span class="lobby__cta-title">Partida rápida</span>
      <span class="lobby__cta-subtitle">Buscá rival automáticamente y jugá online</span>
    </button>

    <button type="button" class="lobby__cta" appNavPending (click)="goToOnline()">
      <span class="lobby__cta-title">Jugar online</span>
      <span class="lobby__cta-subtitle">Creá una partida privada o unite con un código</span>
    </button>

    <button type="button" class="lobby__cta" appNavPending (click)="goToRules()">
      <span class="lobby__cta-title">Reglas de la variante</span>
      <span class="lobby__cta-subtitle">Consultá qué cambia en Truco a 3 puntos</span>
    </button>
  </div>
</section>
