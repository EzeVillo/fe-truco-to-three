<!-- Shell de la aplicación -->
<app-global-header />

<main class="app-main">
  <router-outlet />
</main>

@if (profileNotifications.current(); as notification) {
  <aside class="achievement-toast" role="status" aria-live="polite">
    <div>
      <strong>{{ notification.name }}</strong>
      <p>{{ notification.description }}</p>
    </div>
    <button type="button" aria-label="Cerrar logro" (click)="profileNotifications.dismiss()">
      Cerrar
    </button>
  </aside>
}

@if (social.incomingToast(); as requester) {
  <aside class="friend-request-toast" role="status" aria-live="polite">
    <button
      type="button"
      class="friend-request-toast__close"
      aria-label="Cerrar"
      (click)="social.dismissToast()"
    >
      &times;
    </button>
    <div class="friend-request-toast__info">
      <strong>{{ requester }}</strong>
      <p>Te envió una solicitud de amistad</p>
    </div>
    <div class="friend-request-toast__actions">
      <button
        type="button"
        class="friend-request-toast__btn friend-request-toast__btn--primary"
        (click)="social.acceptRequest(requester)"
      >
        Aceptar
      </button>
      <button
        type="button"
        class="friend-request-toast__btn friend-request-toast__btn--danger"
        (click)="social.declineRequest(requester)"
      >
        Rechazar
      </button>
    </div>
  </aside>
}
