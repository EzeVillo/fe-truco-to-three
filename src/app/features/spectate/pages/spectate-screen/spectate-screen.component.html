<section class="spectate-screen" aria-label="Mirando una partida">

  @if (spectateService.loading()) {
    <div class="spectate-screen__loading">
      <p class="spectate-screen__loading-text">Cargando partida...</p>
    </div>
  } @else if (spectateService.error()) {
    <div class="spectate-screen__error">
      <p class="spectate-screen__error-text">{{ spectateService.error() }}</p>
      <button type="button" class="t3-btn t3-btn--neutral" (click)="goBack()">
        Volver a amigos
      </button>
    </div>
  } @else if (matchView()) {
    <header class="spectate-screen__banner">
      <span class="spectate-screen__banner-text">Estás mirando</span>
      <span class="spectate-screen__counter">
        👁 {{ spectateService.spectatorCount() }}
      </span>
      <button type="button" class="t3-btn t3-btn--neutral spectate-screen__leave" (click)="goBack()">
        Dejar de mirar
      </button>
    </header>

    <app-game-board
      [view]="matchView()!"
      [matchId]="matchId()"
      [spectator]="true"
      [selfCallText]="selfCallText()"
      [opponentCallText]="opponentCallText()"
      [timerRemainingFraction]="timerRemainingFraction()"
      [timerIsUrgent]="timerIsUrgent()"
    />
  }

</section>
