<div class="social-row">
  <div class="social-row__info">
    <span class="social-row__name">{{ requesterUsername() }}</span>
    <span class="social-row__hint">Quiere ser tu amigo</span>
  </div>
  <div class="social-row__actions">
    <button type="button" class="t3-btn t3-btn--primary" (click)="onAccept()">Aceptar</button>
    <button type="button" class="t3-btn t3-btn--destructive" (click)="onDecline()">Rechazar</button>
  </div>
</div>
