<div class="status-panel">
  <div class="status-panel__center">
    <div class="status-panel__players-row">
      <div class="status-panel__player-col">
        <div class="status-panel__player-header">
          <span class="status-panel__turn-dot" [class.active]="view().currentTurnIsSelf"></span>
          <span class="status-panel__label">VOS</span>
        </div>
        <span class="status-panel__player-name">{{ view().self.username }}</span>
        <span class="status-panel__call-text">{{ selfCallText() || ' ' }}</span>
      </div>

      <div class="status-panel__score-col">
        <span class="status-panel__score">{{ view().self.score }}</span>
        <span class="status-panel__divider">—</span>
        <span class="status-panel__score">{{ view().opponent.score }}</span>
      </div>

      <div class="status-panel__player-col status-panel__player-col--right">
        <div class="status-panel__player-header status-panel__player-header--right">
          <span class="status-panel__label">RIVAL</span>
          <span class="status-panel__turn-dot" [class.active]="view().currentTurnIsSelf === false"></span>
        </div>
        <span class="status-panel__player-name">{{ view().opponent.username }}</span>
        <span class="status-panel__call-text">{{ opponentCallText() || ' ' }}</span>
      </div>
    </div>

    <div class="status-panel__series-row">
      <div
        class="status-panel__squares"
        [attr.aria-label]="view().seriesLabel + ': ganaste ' + view().self.gamesWon + ', rival ' + view().opponent.gamesWon"
      >
        @for (slot of seriesSlots(); track $index) {
          <span class="status-panel__square" [class.won-self]="slot === 'self'" [class.won-opponent]="slot === 'opponent'"></span>
        }
      </div>
    </div>
  </div>
</div>
