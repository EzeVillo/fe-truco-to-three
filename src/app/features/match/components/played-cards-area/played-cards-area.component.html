<div class="played-cards-area">
  <div class="played-cards-area__grid">
    <!-- Row 0: opponent -->
    @for (card of opponentRow(); track $index) {
      @if (card) {
        <app-card-view
          [card]="card"
          class="played-cards-area__item played-cards-area__item--opponent"
          [class.played-cards-area__item--winner]="opponentWinnerFlags()[$index]"
        />
      } @else {
        <div class="played-cards-area__slot-empty played-cards-area__item"></div>
      }
    }
    @for (_ of [].constructor(opponentPadding()); track $index) {
      <div class="played-cards-area__slot-empty played-cards-area__item"></div>
    }

    <!-- Row 1: player -->
    @for (card of selfRow(); track $index) {
      @if (card) {
        <app-card-view
          [card]="card"
          [appCardFlight]="card"
          class="played-cards-area__item played-cards-area__item--self"
          [class.played-cards-area__item--winner]="selfWinnerFlags()[$index]"
        />
      } @else {
        <div class="played-cards-area__slot-empty played-cards-area__item"></div>
      }
    }
    @for (_ of [].constructor(selfPadding()); track $index) {
      <div class="played-cards-area__slot-empty played-cards-area__item"></div>
    }
  </div>
</div>
