# Deploy de producción a GitHub Pages (https://ezevillo.github.io/fe-truco-to-three/).
# Se eligió github.io sobre pages.dev/netlify.app porque LinkedIn (y otros filtros)
# rechazan enlaces a subdominios gratuitos de hosting por abuso de phishing.
name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec ng build --base-href /fe-truco-to-three/

      # Fallback SPA: GitHub Pages sirve 404.html para rutas que no existen como archivo.
      - name: Crear fallback SPA
        run: cp dist/fe-truco-to-three/browser/index.html dist/fe-truco-to-three/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/fe-truco-to-three/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
