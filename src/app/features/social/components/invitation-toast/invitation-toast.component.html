@if (store.incomingInvitationToast(); as invitation) {
  <aside class="invitation-toast" role="status" aria-live="polite">
    <div class="invitation-toast__info">
      <strong>{{ invitation.senderUsername }}</strong>
      <p>Te invitó a jugar una partida</p>
    </div>
    <div class="invitation-toast__actions">
      <button
        type="button"
        class="friend-request-toast__btn friend-request-toast__btn--primary"
        (click)="onAccept(invitation.invitationId)"
      >
        Aceptar
      </button>
      <button
        type="button"
        class="friend-request-toast__btn friend-request-toast__btn--danger"
        (click)="onDecline(invitation.invitationId)"
      >
        Rechazar
      </button>
    </div>
  </aside>
}
