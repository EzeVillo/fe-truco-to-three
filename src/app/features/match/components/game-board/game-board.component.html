<div class="game-board">
  <app-match-status-panel [view]="view()" [selfCallText]="selfCallText()" [opponentCallText]="opponentCallText()" />
  <app-opponent-area [opponent]="view().opponent" />
  <app-played-cards-area
    [selfPlayedInCurrentHand]="view().self.playedInCurrentHand"
    [opponentPlayedInCurrentHand]="view().opponent.playedInCurrentHand"
    [selfPlayedInPreviousHands]="view().self.playedInPreviousHands"
    [opponentPlayedInPreviousHands]="view().opponent.playedInPreviousHands"
  />
  <app-player-area [self]="view().self" [matchId]="matchId()" [playCardsEnabled]="playCardsEnabled()" />
  <app-available-actions-panel
    [availableActions]="view().availableActions"
    [currentTrucoCall]="view().currentTrucoCall"
    [matchId]="matchId()"
  />
</div>
