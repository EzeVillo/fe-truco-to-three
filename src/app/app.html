<!-- Shell de la aplicación -->
<header class="app-header">
  <a class="app-header__brand" [routerLink]="authStore.isAuthenticated() ? '/lobby' : '/login'">
    <img src="icon.png" alt="" class="app-header__brand-logo" />
    <span class="app-header__brand-text">Truco<span class="app-header__brand-accent">a 3</span></span>
  </a>

  <span class="app-header__spacer"></span>

  @if (authStore.isAuthenticated()) {
    <span class="app-header__user">
      {{ authStore.isGuest() ? 'Invitado' : 'Jugador' }}
    </span>
    <button type="button" class="app-header__logout" (click)="logout()">Salir</button>
  }
</header>

<main class="app-main">
  <router-outlet />
</main>
