<div class="series-format" role="radiogroup" aria-label="Formato de serie">
  @for (opt of options; track opt.value) {
    <button
      type="button"
      role="radio"
      class="series-format__option"
      [class.series-format__option--active]="format() === opt.value"
      [attr.aria-checked]="format() === opt.value"
      [attr.aria-label]="opt.ariaLabel"
      (click)="select(opt.value)"
    >
      {{ opt.label }}
    </button>
  }
</div>
