<section class="rules-page">
  <div class="rules-page__topbar">
    <app-back-button label="Volver" (back)="goBack()" />
    <h1 class="rules-page__title">Reglas de la variante</h1>
  </div>

  <div class="rules-page__scroll">
    <app-rules-section />
  </div>

  @if (!isAuthenticated()) {
    <footer class="rules-page__footer">
      <a routerLink="/register" class="t3-btn t3-btn--primary">Crear cuenta y jugar</a>
      <a routerLink="/login" class="t3-btn t3-btn--neutral">Ya tengo cuenta</a>
    </footer>
  }
</section>
