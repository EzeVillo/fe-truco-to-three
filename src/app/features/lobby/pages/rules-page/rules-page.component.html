<section class="rules-page">
  <div class="rules-page__topbar">
    <app-back-button label="Volver" [disabled]="navLocked()" (back)="goBack()" />
    <h1 class="rules-page__title">Reglas de la variante</h1>
  </div>

  <div class="rules-page__scroll">
    <app-rules-section />
  </div>

  @if (!isAuthenticated()) {
    <footer class="rules-page__footer">
      <app-guest-cta />
      <a routerLink="/register" class="t3-btn t3-btn--neutral" data-ui-click appNavPending
        >Creá una cuenta o iniciá sesión</a
      >
    </footer>
  }
</section>
